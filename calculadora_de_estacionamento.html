<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parquímetro</title>
  <link rel="stylesheet" href="calculadora_de_estacionamento.css">
</head>
<body>

  <main class="container">
    <h1>Parquímetro</h1>

    <p>Informe o valor pago para calcular o tempo de permanência.</p>

    <label for="valor">Valor pago R$:</label>
    <input type="number" id="valor" step="0.01" placeholder="Ex: 2.00">

    <button onclick="calcularParquimetro()">Calcular</button>

    <div id="resultado"></div>
  </main>

  <script src="calculadora_de_estacionamento.js"></script>
</body>
</html>
